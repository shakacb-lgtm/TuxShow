<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TuxShow Script</title>
  <link rel="manifest" href="/manifest-cuelist.json">
  <style>
    body {
      background-color: #111827;
      color: #f3f4f6;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #1f2937;
      padding: 1rem;
      border-bottom: 1px solid #374151;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    h1 {
      margin: 0;
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #cue-list {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .cue-item {
      background-color: #1f2937;
      border: 1px solid #374151;
      border-radius: 0.5rem;
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .cue-item.playing {
      border-color: #10b981;
      background-color: rgba(16, 185, 129, 0.1);
    }
    .cue-item.stopping {
      border-color: #f59e0b;
      background-color: rgba(245, 158, 11, 0.1);
    }
    .cue-number {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      color: #9ca3af;
      font-size: 0.9rem;
      min-width: 3rem;
    }
    .cue-name {
      font-weight: 600;
      flex-grow: 1;
    }
    .cue-type {
      font-size: 0.75rem;
      color: #6b7280;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <header>
    <h1>TuxShow Script / Cue List</h1>
  </header>
  <div id="cue-list">
    <!-- Cues will be rendered dynamically -->
  </div>
  <script src="/cuelist.js"></script>
</body>
</html>
