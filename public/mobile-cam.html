<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuxShow | Mobile Camera</title>
    <link rel="manifest" href="/manifest-cam.json">
    <link rel="icon" type="image/png" href="/icon.png">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; overflow: hidden; overscroll-behavior: none; }
        video { object-fit: cover; }
    </style>
</head>
<body class="flex flex-col h-screen w-screen relative">
    
    <video id="preview" autoplay playsinline muted class="absolute inset-0 w-full h-full z-0 pointer-events-none"></video>
    
    <div class="absolute inset-x-0 top-0 bg-gradient-to-b from-black/90 via-black/60 to-transparent p-4 pb-12 z-10 flex flex-col gap-3">
        <div class="flex justify-between items-start">
            <button id="connectBtn" class="bg-blue-600 hover:bg-blue-500 active:scale-95 transition-transform text-white font-bold py-3 px-6 rounded-full shadow-[0_0_15px_rgba(37,99,235,0.4)] text-sm uppercase tracking-wider">Go Live</button>
            <div id="statusIndicator" class="px-2 py-1 rounded text-[10px] font-mono font-bold uppercase tracking-wider bg-gray-800 text-gray-400 border border-gray-700 mt-1.5">Offline</div>
        </div>
        <p id="errorLog" class="text-red-400 text-xs font-mono bg-black/60 p-2 rounded hidden"></p>
    </div>

    <script src="/mobile-cam.js"></script>
</body>
</html>
